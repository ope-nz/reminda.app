<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Reminda by Ope Ltd</title>
    <link rel="stylesheet" href="assets/css/caco3.css" />
    <link rel="stylesheet" href="assets/css/phosphor.css" />
    <script src="assets/js/auth.js"></script>
    <link rel="icon" type="image/png" href="assets/img/kanban.png">
</head>

<body style="overflow-y:hidden;overflow-x:hidden;">
    <div id="signin" style="width:100vw; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem;">
        <i class="ph ph-kanban" aria-hidden="true" style="font-size:100px;"></i>
        <h1>Reminda</h1>
        <h3>Kanban for ArcGIS Online</h3>
        <p>by Ope Ltd</p>
        <p></p>
        <button id="signInBtn"><i class="ph ph-sign-in" aria-hidden="true"></i> Sign In</button>
        <button data-icon-only="" data-appearance="transparent" title="Help" onclick="window.location.href='help.html'"><i class="ph ph-question" aria-hidden="true"></i></button>
    </div>
    <script>
        document.getElementById('signInBtn').addEventListener('click', startSignIn);
    </script>
    <script src="assets/js/darkmode.js"></script>
</body>
</html>
