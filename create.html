<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Reminda by Ope Ltd</title>
    <link rel="stylesheet" href="assets/css/caco3.css" />
    <link rel="stylesheet" href="assets/css/phosphor.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/caco3-alerts.js"></script>
    <script src="assets/js/create.js"></script>
    <link rel="icon" type="image/png" href="assets/img/kanban.png">
</head>

<body>
    <nav>
        <a href="index.html">
            Reminda
            <small>Kanban for ArcGIS Online</small>
        </a>
        <button onclick="window.location.href='help.html'" data-appearance="transparent" data-icon-only aria-label="Help" title="Help">
            <i class="ph ph-question" aria-hidden="true"></i>
        </button>
        <button id="mode-toggle" data-appearance="transparent" data-icon-only aria-label="Toggle dark mode" title="Switch to dark mode">
            <i class="ph ph-moon" aria-hidden="true"></i>
        </button>
    </nav>

    <main>
        <section>
            <form onsubmit="return false;">
                <header>
                    <h3>Load an existing board</h3>
                </header>
                <label for="boardsDropdown">Board</label>
                <select id="boardsDropdown"><option>Loading...</option></select>
                <button id="btnLoadBoard" type="button">Load Board</button>
            </form>
        </section>
        <section>
            <form onsubmit="return false;">
                <header>
                    <h3>Create a new Kanban board</h3>
                </header>
                <label for="boardname">Board Name</label>
                <input type="text" id="boardname" placeholder="Board Name">
                <button id="btnCreateBoard" type="submit" onclick="createKanbanFeatureService(event)">Create Board</button>
                <div id="createSpinner" style="display:none;text-align:center;margin-top:1rem;">
                    <progress></progress>
                    <p>Creating board...</p>
                </div>
            </form>
        </section>
    </main>

    <script src="assets/js/darkmode.js"></script>

</body>
</html>
